<style>.tb{display:inline-block;margin:auto;padding:0.55em;font-size:1.4em;font-family:d2coding;width:99%;height:85%;}</style><br><textarea class="tb"id="0"placeholder="&#10&nbsp페이지 새로고침 시 마지막에 저장한 내용으로 되돌아갑니다. &#10&nbsp변경 사항을 저장하려면 맨 아래에 생성되는 링크를 누르세요."onkeyup="sv(0,1);"autocomplete="off"></textarea><br><br><a id=1 style="font-size:1.2em;color:#9cd3ff"></a></a><script>function ge(a){return document.getElementById(a)} function es(a){return btoa(unescape(encodeURIComponent(a)))} function ds(a){return decodeURIComponent(escape(atob(a)))} function sv(a,b){var et=es(ge(a).value);ge(b).innerText=` Base64 크기: ${et.length}자, 이 링크를 눌러 저장합니다.`;ge(b).href=`${location.pathname}?${et}`;if(et.length>2014){ge(b).style="font-size:1.2em;color:#ff9ca2";ge(b).innerText=` 길이 ${et.length}자로 일부 브라우저에서 호환되지 않을 수 있습니다. 저장하시려면 이 링크를 누르세요.`}} var vd=location.search.substring(1);if(vd.length>0){ge(1).innerText=" 새로고침 시 현재 내용으로 복원됩니다."};ge(0).value=ds(vd)</script>
